<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 4a - Question 3</title>
</head>
<body>
    <h2>For Loop Output</h2>

    <p id="demo"></p>

    <script>
        let text = "";

        // Loop from 1 to 5
        for (let i = 1; i <= 5; i++) {
            // Add the line and a line break
            text += "The number is " + i + "<br>";
        }

        // Display the result in the <p> element
        document.getElementById("demo").innerHTML = text;
    </script>
</body>
</html>
