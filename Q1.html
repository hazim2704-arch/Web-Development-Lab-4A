<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 4a - Question 1</title>
</head>
<body>
    <div id="myElement">
        <p>Welcome to my website!</p>
    </div>

    <button onclick="changeText()">Change Text</button>

    <script>
        function changeText() {
            const divElement = document.getElementById("myElement");
            const paragraph = divElement.querySelector("p");
            paragraph.textContent = "Hello there!";
        }
    </script>
</body>
</html>
