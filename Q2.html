<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 4a - Question 2</title>
</head>
<body>
    <h2>Number Validation</h2>

    <input type="text" id="userInput" placeholder="Enter a number">
    <button onclick="checkInput()">Check</button>

    <script>
        function checkInput() {
            const value = document.getElementById("userInput").value;

            const number = Number(value);

            if (value.trim() === "" || isNaN(number)) {
                alert("Please insert a number!");
            } else if (number < 10) {
                alert("The number is lower than 10");
            } else {
                alert("The number is higher than 10");
            }
        }
    </script>
</body>
</html>
